<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRMNL Hong Kong Weather</title>
  <style>
    /* Absolute reset for tight pixel-perfect layout control */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      width: 800px;
      height: 480px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    /* Top row: Location and live timestamp */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 4px solid #000000;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #time {
      font-size: 20px;
      font-weight: 500;
    }

    /* Main body layout grid */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      flex-grow: 1;
    }

    /* Left Side: Current Metric Matrix */
    .weather-box {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .temp-row {
      display: flex;
      align-items: flex-start;
      margin-top: -10px;
    }

    .temperature {
      font-size: 110px;
      font-weight: 800;
      line-height: 0.9;
    }

    .unit {
      font-size: 40px;
      font-weight: 700;
      margin-top: 10px;
      margin-left: 4px;
    }

    .condition-text {
      font-size: 24px;
      font-weight: 700;
      margin-top: 10px;
      line-height: 1.2;
    }

    .meta-metrics {
      margin-top: auto;
      font-size: 20px;
      font-weight: 600;
      display: flex;
      gap: 30px;
      border-top: 2px dashed #000000;
      padding-top: 15px;
    }

    /* Right Side: Heavy-duty visual layout for HKO Warnings */
    .warning-box {
      border: 4px solid #000000;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .warning-header {
      font-size: 20px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #000000;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    /* Warning box state rules */
    .warning-box.active {
      background-color: #000000;
      color: #ffffff;
    }
    .warning-box.active .warning-header {
      border-color: #ffffff;
    }

    .warning-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .warning-item {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Solid inverted badge for maximum visibility on ink display */
    .warning-box.active .warning-item-badge {
      background-color: #ffffff;
      color: #000000;
    }
    
    .warning-item-badge {
      background-color: #000000;
      color: #ffffff;
      padding: 2px 8px;
      font-size: 14px;
      font-weight: 800;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .no-warnings {
      font-size: 22px;
      font-weight: 600;
      color: #666666;
      margin: auto 0;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>Hong Kong</h1>
    <div id="time">Loading update...</div>
  </header>

  <div class="content-grid">
    <!-- Left: Core Conditions -->
    <div class="weather-box">
      <div>
        <div class="temp-row">
          <span class="temperature" id="temp">--</span>
          <span class="unit">°C</span>
        </div>
        <div class="condition-text" id="condition">Fetching data...</div>
      </div>
      
      <div class="meta-metrics">
        <div>Humidity: <span id="humidity">--</span>%</div>
        <div>UV Index: <span id="uv">--</span></div>
      </div>
    </div>

    <!-- Right: Active Threat Vectors -->
    <div class="warning-box" id="warningBox">
      <div class="warning-header">Signals & Warnings</div>
      <div class="warning-list" id="warningList">
        <div class="no-warnings">Checking signals...</div>
      </div>
    </div>
  </div>

  <script>
    async function fetchHKWeather() {
      try {
        // HKO endpoints for Current Weather and Active Warning Summaries
        const weatherUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en';
        const warningUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en';

        const [weatherRes, warningRes] = await Promise.all([
          fetch(weatherUrl),
          fetch(warningUrl)
        ]);

        const weatherData = await weatherRes.json();
        const warningData = await warningRes.json();

        // 1. Process and assign core temperatures (Using HKO main station as anchor)
        if (weatherData.temperature && weatherData.temperature.data.length > 0) {
          const hkoTemp = weatherData.temperature.data.find(item => item.place === 'Hong Kong Observatory');
          document.getElementById('temp').innerText = hkoTemp ? hkoTemp.value : weatherData.temperature.data[0].value;
        }

        // 2. Humidity
        if (weatherData.humidity && weatherData.humidity.data.length > 0) {
          document.getElementById('humidity').innerText = weatherData.humidity.data[0].value;
        }

        // 3. UV Index
        if (weatherData.uvindex && weatherData.uvindex.data && weatherData.uvindex.data.length > 0) {
          document.getElementById('uv').innerText = weatherData.uvindex.data[0].value;
        } else {
          document.getElementById('uv').innerText = '0';
        }

        // 4. Fallback logic text description for cloud cover/rain
        if (weatherData.rainfall && weatherData.rainfall.data) {
          // If we have text descriptions, use them
          const desc = weatherData.weatherDescription || "Fine Conditions";
          document.getElementById('condition').innerText = desc;
        }

        // 5. Update Timestamp
        if (weatherData.updateTime) {
          const dateObj = new Date(weatherData.updateTime);
          document.getElementById('time').innerText = dateObj.toLocaleTimeString('en-HK', { 
            hour: '2-digit', 
            minute: '2-digit', 
            hour12: true 
          }) + " HKT";
        }

        // 6. Warning System Handling
        const warningBox = document.getElementById('warningBox');
        const warningList = document.getElementById('warningList');
        warningList.innerHTML = ''; // Wipe loading placeholder

        // The HKO warnsum endpoint returns active warning key-value pairings when alerts are live
        const activeWarningKeys = Object.keys(warningData);

        if (activeWarningKeys.length > 0) {
          warningBox.classList.add('active'); // Invert color scheme instantly to draw eye

          activeWarningKeys.forEach(key => {
            const alert = warningData[key];
            const item = document.createElement('div');
            item.className = 'warning-item';
            
            // Clean up naming format if sub-codes exist (e.g., specific rainstorm colors)
            const alertName = alert.name.replace('Warning', '').trim();
            const alertCode = alert.code || "ALERT";

            item.innerHTML = `<span class="warning-item-badge">${alertCode}</span> <span>${alertName}</span>`;
            warningList.appendChild(item);
          });
        } else {
          // No alerts in force: safely revert box to neutral light gray/white baseline
          warningBox.classList.remove('active');
          warningList.innerHTML = '<div class="no-warnings">No Active Warning Signals</div>';
        }

      } catch (error) {
        console.error('Data pull failure:', error);
        document.getElementById('condition').innerText = 'Error loading live HKO streams.';
      }
    }

    // Fire immediately on render
    fetchHKWeather();
    
    // Auto-refresh script context every 10 minutes (600000ms) inside local browser sandbox 
    setInterval(fetchHKWeather, 600000);
  </script>
</body>
</html>
