<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRMNL OG Icon-Dense HK Weather</title>
  <style>
    /* Strict pixel-perfect structural reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      width: 800px;
      height: 480px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    /* High-density header component */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 3px solid #000000;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #time {
      font-size: 16px;
      font-weight: 700;
      text-align: right;
      line-height: 1.2;
    }

    /* 3-Column Split Framework to maximize space */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 250px 240px 1fr;
      gap: 16px;
      flex-grow: 1;
      height: 250px;
    }

    /* COLUMN 1: Core Observational Readouts */
    .core-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .condition-block {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .temp-wrapper {
      display: flex;
      align-items: flex-start;
    }

    .giant-temp {
      font-size: 76px;
      font-weight: 800;
      line-height: 0.85;
    }

    .deg-unit {
      font-size: 26px;
      font-weight: 700;
      margin-top: 4px;
      margin-left: 2px;
    }

    .main-icon-holder svg {
      width: 64px;
      height: 64px;
      stroke: #000000;
      fill: none;
      stroke-width: 2.5;
    }

    .condition-lbl {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .mini-metrics {
      border-top: 2px solid #000000;
      padding-top: 8px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    /* COLUMN 2: Regional Hub Telemetry Grid */
    .regional-panel {
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      border-bottom: 2px dashed #000000;
      padding-bottom: 2px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .station-row {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 700;
      padding: 4px 0;
      border-bottom: 1px solid #eeeeee;
    }

    /* COLUMN 3: Severe Threat Context Block */
    .warning-panel {
      border: 3px solid #000000;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    .warning-panel.alert-active {
      background-color: #000000;
      color: #ffffff;
    }

    .warning-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .warning-row {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .warning-badge {
      background-color: #000000;
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid #ffffff;
    }

    .warning-panel.alert-active .warning-badge {
      background-color: #ffffff;
      color: #000000;
      border: none;
    }

    .empty-warnings {
      font-size: 16px;
      font-weight: 700;
      color: #666666;
      text-align: center;
      margin: auto 0;
      font-style: italic;
    }

    /* LOWER ZONE: Horizontal Short-Range Outlook Track */
    .forecast-panel {
      margin-top: auto;
      display: flex;
      flex-direction: column;
    }

    .forecast-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .forecast-card {
      background-color: #ffffff;
      border: 2px solid #000000;
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 125px;
    }

    .fc-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #000;
      padding-bottom: 4px;
    }

    .fc-day-group {
      display: flex;
      flex-direction: column;
    }

    .fc-day {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
    }

    .fc-date {
      font-size: 11px;
      font-weight: 700;
      color: #555555;
    }

    .fc-icon-holder svg {
      width: 28px;
      height: 28px;
      stroke: #000000;
      fill: none;
      stroke-width: 2.5;
    }

    .fc-temp {
      font-size: 20px;
      font-weight: 800;
      margin: 2px 0;
    }

    .fc-desc {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      color: #333333;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <header>
    <h1>HK Weather Map</h1>
    <div id="time">Loading...</div>
  </header>

  <!-- Upper Grid Division -->
  <div class="dashboard-grid">
    <!-- Col 1: Core Metrics -->
    <div class="core-panel">
      <div>
        <div class="condition-block">
          <div class="temp-wrapper">
            <span class="giant-temp" id="curr-temp">--</span>
            <span class="deg-unit">°C</span>
          </div>
          <div class="main-icon-holder" id="main-icon">
            <!-- Dynamic SVG Injected Here -->
          </div>
        </div>
        <div class="condition-lbl" id="curr-desc">Loading observations...</div>
      </div>
      <div class="mini-metrics">
        <div>Humidity: <span id="curr-rh">--</span>%</div>
        <div>UV Index: <span id="curr-uv">--</span></div>
        <div>Pressure: <span id="curr-pres">--</span> hPa</div>
      </div>
    </div>

    <!-- Col 2: Regional Observations -->
    <div class="regional-panel">
      <div class="panel-title">Regional Network</div>
      <div id="regional-list">
        <div class="station-row"><span>Central</span><span>--°</span></div>
        <div class="station-row"><span>Tsim Sha Tsui</span><span>--°</span></div>
        <div class="station-row"><span>Sha Tin</span><span>--°</span></div>
        <div class="station-row"><span>HK Airport</span><span>--°</span></div>
        <div class="station-row"><span>Sai Kung</span><span>--°</span></div>
      </div>
    </div>

    <!-- Col 3: Alerts/Warnings -->
    <div class="warning-panel" id="alertBox">
      <div class="panel-title" style="border-color:inherit;">Active HKO Signals</div>
      <div class="warning-list" id="alertList">
        <div class="empty-warnings">Checking systems...</div>
      </div>
    </div>
  </div>

  <!-- Lower Outlook Track -->
  <div class="forecast-panel">
    <div class="panel-title">4-Day Short-Range Outlook</div>
    <div class="forecast-row" id="forecastRow">
      <!-- Injected via JavaScript -->
    </div>
  </div>

  <script>
    // Pure monochrome inline vector dictionary optimized for TRMNL E-Ink displays
    const SVG_ICONS = {
      sunny: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
      cloudy: `<svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
      rainy: `<svg viewBox="0 0 24 24"><path d="M16 13v8M12 15v6M8 13v8M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>`,
      thunderstorm: `<svg viewBox="0 0 24 24"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 8.58M13 11l-4 6h5l-3 5"/></svg>`,
      windy: `<svg viewBox="0 0 24 24"><path d="M2 4h18a2 2 0 0 1 0 4H12M2 12h14a2 2 0 0 0 0-4M2 20h20a2 2 0 0 0 0-4H8"/></svg>`
    };

    // Helper logic translating custom HKO icon strings to basic vector sets
    function getVectorIcon(iconId, textDescription) {
      const id = parseInt(iconId);
      const desc = (textDescription || '').toLowerCase();
      
      // Clear mapping match sets based on standard HKO API parameters
      if ([50, 51, 52].includes(id) || desc.includes('sunny' ) || desc.includes('fine')) return SVG_ICONS.sunny;
      if ([53, 54, 60, 61].includes(id) || desc.includes('thunderstorm') || desc.includes('squall')) return SVG_ICONS.thunderstorm;
      if ([62, 63, 64, 65].includes(id) || desc.includes('rain') || desc.includes('shower')) return SVG_ICONS.rainy;
      if (desc.includes('gale') || desc.includes('wind')) return SVG_ICONS.windy;
      return SVG_ICONS.cloudy; // Safe default mapping fallback
    }

    async function refreshData() {
      try {
        const rhrreadUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en';
        const warnsumUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en';
        const fndUrl = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en';

        const [rCurrent, rWarnings, rForecast] = await Promise.all([
          fetch(rhrreadUrl), fetch(warnsumUrl), fetch(fndUrl)
        ]);

        const current = await rCurrent.json();
        const warnings = await rWarnings.json();
        const forecast = await rForecast.json();

        // 1. Core Pillar Assignments
        if (current.temperature && current.temperature.data) {
          const hko = current.temperature.data.find(d => d.place === 'Hong Kong Observatory');
          document.getElementById('curr-temp').innerText = hko ? hko.value : current.temperature.data[0].value;
        }
        if (current.humidity && current.humidity.data) {
          document.getElementById('curr-rh').innerText = current.humidity.data[0].value;
        }
        document.getElementById('curr-uv').innerText = (current.uvindex && current.uvindex.data && current.uvindex.data.length > 0) ? current.uvindex.data[0].value : '0';
        document.getElementById('curr-pres').innerText = (current.barometer && current.barometer.data) ? current.barometer.data[0].value : '1012';
        document.getElementById('curr-desc').innerText = current.weatherDescription || 'Stable';

        // Injected Current Condition Hero Icon
        if (current.icon && current.icon.length > 0) {
          document.getElementById('main-icon').innerHTML = getVectorIcon(current.icon[0], current.weatherDescription);
        }

        // 2. Explicit Weather Data Update Timestamp
        if (current.updateTime) {
          const d = new Date(current.updateTime);
          const timeString = d.toLocaleTimeString('en-HK', { hour: '2-digit', minute: '2-digit', hour12: true });
          const dateString = d.toLocaleDateString('en-HK', { month: 'short', day: 'numeric' });
          
          document.getElementById('time').innerHTML = `
            <span style="font-size: 11px; font-weight: 800; text-transform: uppercase; color: #555; display: block; margin-bottom: -2px;">HKO Update</span>
            <strong>${timeString}</strong><br>
            <span style="font-size: 13px; color: #444;">${dateString}</span>
          `;
        }

        // 3. Regional Microclimates
        const hubs = { 'Central': '--°', 'Tsim Sha Tsui': '--°', 'Sha Tin': '--°', 'Hong Kong International Airport': '--°', 'Sai Kung': '--°' };
        if (current.temperature && current.temperature.data) {
          current.temperature.data.forEach(item => {
            if (item.place in hubs) hubs[item.place] = `${item.value}°`;
          });
        }
        const regList = document.getElementById('regional-list');
        regList.innerHTML = '';
        for (const [place, val] of Object.entries(hubs)) {
          const displayName = place === 'Hong Kong International Airport' ? 'HK Airport' : place;
          regList.innerHTML += `<div class="station-row"><span>${displayName}</span><span>${val}</span></div>`;
        }

        // 4. Warning Array Execution
        const alertBox = document.getElementById('alertBox');
        const alertList = document.getElementById('alertList');
        alertList.innerHTML = '';
        const keys = Object.keys(warnings);

        if (keys.length > 0) {
          alertBox.classList.add('alert-active');
          keys.forEach(k => {
            const row = document.createElement('div');
            row.className = 'warning-row';
            row.innerHTML = `<span class="warning-badge">${warnings[k].code}</span><span>${warnings[k].name.replace('Warning', '').trim()}</span>`;
            alertList.appendChild(row);
          });
        } else {
          alertBox.classList.remove('alert-active');
          alertList.innerHTML = '<div class="empty-warnings">No Active HKO Alerts</div>';
        }

        // 5. Short-Range 4-Day Horizontal Horizon Layout with sub-icons
        const fcRow = document.getElementById('forecastRow');
        fcRow.innerHTML = '';
        if (forecast.weatherForecast) {
          forecast.weatherForecast.slice(0, 4).forEach(day => {
            const shortDay = day.week.substring(0, 3);
            const displayDate = day.forecastDate.substring(6,8) + '/' + day.forecastDate.substring(4,6);
            const cardIcon = getVectorIcon(day.forecastIcon, day.forecastWeather);
            
            fcRow.innerHTML += `
              <div class="forecast-card">
                <div class="fc-header-row">
                  <div class="fc-day-group">
                    <span class="fc-day">${shortDay}</span>
                    <span class="fc-date">${displayDate}</span>
                  </div>
                  <div class="fc-icon-holder">${cardIcon}</div>
                </div>
                <div class="fc-temp">${day.forecastMintemp.value}°–${day.forecastMaxtemp.value}°</div>
                <div class="fc-desc">${day.forecastWeather}</div>
              </div>`;
          });
        }

      } catch (err) {
        console.error('Data pipeline exception:', err);
        document.getElementById('curr-desc').innerText = 'Sync tracking failure.';
      }
    }

    refreshData();
    setInterval(refreshData, 600000); // 10 minute updates
  </script>
</body>
</html>
