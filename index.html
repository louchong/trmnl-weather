<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>TRMNL OG Bilingual HK Weather Map</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      width: 800px;
      height: 480px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 14px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 3px solid #000000;
      padding-bottom: 2px;
      margin-bottom: 10px;
    }

    .title-group h1 {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }
    .title-group span {
      font-size: 14px;
      font-weight: 700;
      color: #444444;
    }

    #time {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      line-height: 1.2;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 260px 220px 1fr;
      gap: 14px;
      height: 255px;
    }

    .core-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .condition-block {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .giant-temp {
      font-size: 70px;
      font-weight: 800;
      line-height: 0.85;
    }

    .deg-unit {
      font-size: 24px;
      font-weight: 700;
    }

    .main-icon-holder svg {
      width: 58px;
      height: 58px;
      stroke: #000000;
      fill: none;
      stroke-width: 2.5;
    }

    .condition-lbl {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      margin-top: 4px;
    }

    .mini-metrics {
      border-top: 2px solid #000000;
      padding-top: 6px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      border-bottom: 2px dashed #000000;
      padding-bottom: 2px;
      margin-bottom: 6px;
    }

    .station-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      padding: 3px 0;
      border-bottom: 1px solid #eeeeee;
    }
    .station-zh { font-size: 13px; color: #444; }

    .warning-panel {
      border: 3px solid #000000;
      border-radius: 6px;
      padding: 8px;
      display: flex;
      flex-direction: column;
    }
    .warning-panel.alert-active { background-color: #000000; color: #ffffff; }

    .warning-row {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .warning-badge {
      background-color: #000000;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      padding: 1px 4px;
      border-radius: 3px;
      border: 1px solid #ffffff;
    }
    .warning-panel.alert-active .warning-badge { background-color: #ffffff; color: #000000; border: none; }

    .empty-warnings {
      font-size: 15px;
      font-weight: 700;
      color: #666666;
      text-align: center;
      margin: auto 0;
    }

    .forecast-panel { margin-top: auto; }
    .forecast-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    
    .forecast-card {
      border: 2px solid #000000;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 135px;
    }

    .fc-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #000; padding-bottom: 2px; }
    .fc-day { font-size: 13px; font-weight: 800; }
    .fc-zh { font-size: 11px; color: #555; }
    .fc-icon-holder svg { width: 26px; height: 26px; stroke: #000000; fill: none; stroke-width: 2.5; }
    .fc-temp { font-size: 18px; font-weight: 800; }
    .fc-desc { font-size: 11px; font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>

  <header>
    <div class="title-group">
      <h1>香港天氣地圖</h1>
      <span>HK Weather Map</span>
    </div>
    <div id="time">更新中...</div>
  </header>

  <div class="dashboard-grid">
    <div class="core-panel">
      <div>
        <div class="condition-block">
          <div class="temp-wrapper"><span class="giant-temp" id="curr-temp">--</span><span class="deg-unit">°C</span></div>
          <div class="main-icon-holder" id="main-icon"></div>
        </div>
        <div class="condition-lbl" id="curr-desc">載入中...</div>
      </div>
      <div class="mini-metrics">
        <div>濕度 / Humid: <span id="curr-rh">--</span>%</div>
        <div>紫外線 / UV: <span id="curr-uv">--</span></div>
        <div>氣壓 / Baro: <span id="curr-pres">--</span> hPa</div>
      </div>
    </div>

    <div class="regional-panel">
      <div class="panel-title">分區溫度 Regional</div>
      <div id="regional-list"></div>
    </div>

    <div class="warning-panel" id="alertBox">
      <div class="panel-title" style="border-color:inherit;">警告信號 Warnings</div>
      <div class="warning-list" id="alertList">
        <div class="empty-warnings">系統檢查中...</div>
      </div>
    </div>
  </div>

  <div class="forecast-panel">
    <div class="panel-title">四天天氣預報 4-Day Outlook</div>
    <div class="forecast-row" id="forecastRow"></div>
  </div>

  <script>
    const SVG_ICONS = {
      sunny: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
      cloudy: `<svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
      rainy: `<svg viewBox="0 0 24 24"><path d="M16 13v8M12 15v6M8 13v8M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></svg>`,
      thunderstorm: `<svg viewBox="0 0 24 24"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 8.58M13 11l-4 6h5l-3 5"/></svg>`,
      windy: `<svg viewBox="0 0 24 24"><path d="M2 4h18a2 2 0 0 1 0 4H12M2 12h14a2 2 0 0 0 0-4M2 20h20a2 2 0 0 0 0-4H8"/></svg>`
    };

    function getVectorIcon(iconId, descText) {
      const id = parseInt(iconId); const txt = (descText || '').toLowerCase();
      if ([50, 51, 52].includes(id) || txt.includes('sunny') || txt.includes('fine') || txt.includes('天晴')) return SVG_ICONS.sunny;
      if ([53, 54, 60, 61].includes(id) || txt.includes('thunderstorm') || txt.includes('雷暴')) return SVG_ICONS.thunderstorm;
      if ([62, 63, 64, 65].includes(id) || txt.includes('rain') || txt.includes('shower') || txt.includes('雨')) return SVG_ICONS.rainy;
      if (txt.includes('gale') || txt.includes('wind') || txt.includes('大風')) return SVG_ICONS.windy;
      return SVG_ICONS.cloudy;
    }

    async function refreshData() {
      try {
        const cb = '&_cb=' + Date.now(); // Absolute cache buster assignment
        const base = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?';
        
        const [rEn, rTc, rWnEn, rWnTc, rFcEn, rFcTc] = await Promise.all([
          fetch(`${base}dataType=rhrread&lang=en${cb}`).then(r => r.json()),
          fetch(`${base}dataType=rhrread&lang=tc${cb}`).then(r => r.json()),
          fetch(`${base}dataType=warnsum&lang=en${cb}`).then(r => r.json()),
          fetch(`${base}dataType=warnsum&lang=tc${cb}`).then(r => r.json()),
          fetch(`${base}dataType=fnd&lang=en${cb}`).then(r => r.json()),
          fetch(`${base}dataType=fnd&lang=tc${cb}`).then(r => r.json())
        ]);

        // 1. Current temperature measurements
        if (rEn.temperature && rEn.temperature.data) {
          const hko = rEn.temperature.data.find(d => d.place === 'Hong Kong Observatory');
          document.getElementById('curr-temp').innerText = hko ? hko.value : rEn.temperature.data[0].value;
        }
        document.getElementById('curr-rh').innerText = rEn.humidity.data[0].value;
        document.getElementById('curr-uv').innerText = (rEn.uvindex && rEn.uvindex.data) ? rEn.uvindex.data[0].value : '0';
        document.getElementById('curr-pres').innerText = (rEn.barometer && rEn.barometer.data) ? rEn.barometer.data[0].value : '1012';
        document.getElementById('curr-desc').innerHTML = `${rTc.weatherDescription[0]}<br><span style="font-size:12px;color:#555">${rEn.weatherDescription[0]}</span>`;

        if (rEn.icon && rEn.icon.length > 0) {
          document.getElementById('main-icon').innerHTML = getVectorIcon(rEn.icon[0], rEn.weatherDescription[0]);
        }

        // 2. Bilingual HKO Update Clock
        if (rEn.updateTime) {
          const d = new Date(rEn.updateTime);
          const tStr = d.toLocaleTimeString('en-HK', { hour: '2-digit', minute: '2-digit', hour12: true });
          document.getElementById('time').innerHTML = `<span style="font-size:10px;color:#555;display:block;">天文台更新 HKO UPDATE</span><strong>${tStr}</strong>`;
        }

        // 3. Regional mapping network array elements
        const places = [
          { en: 'Central', tc: '中環' },
          { en: 'Tsim Sha Tsui', tc: '尖沙咀' },
          { en: 'Sha Tin', tc: '沙田' },
          { en: 'Hong Kong International Airport', tc: '機場' },
          { en: 'Sai Kung', tc: '西貢' }
        ];
        const regList = document.getElementById('regional-list'); regList.innerHTML = '';
        places.forEach(p => {
          const hkoEn = rEn.temperature.data.find(d => d.place === p.en);
          const val = hkoEn ? `${hkoEn.value}°` : '--°';
          const nameDisplay = p.en === 'Hong Kong International Airport' ? 'HK Airport' : p.en;
          regList.innerHTML += `<div class="station-row"><div>${p.tc} <span class="station-grid-en" style="font-size:11px;color:#555;">${nameDisplay}</span></div><strong>${val}</strong></div>`;
        });

        // 4. Warning Array Assembly Execution
        const alertBox = document.getElementById('alertBox'); const alertList = document.getElementById('alertList');
        alertList.innerHTML = ''; const keys = Object.keys(rWnEn);
        if (keys.length > 0) {
          alertBox.classList.add('alert-active');
          keys.forEach(k => {
            const row = document.createElement('div'); row.className = 'warning-row';
            row.innerHTML = `<span class="warning-badge">${rWnEn[k].code}</span><div>${rWnTc[k].name.replace('警告','').replace('信號','')}<br><span style="font-size:10px;opacity:0.8;display:block;margin-top:-2px;">${rWnEn[k].name.replace('Warning','').trim()}</span></div>`;
            alertList.appendChild(row);
          });
        } else {
          alertBox.classList.remove('alert-active');
          alertList.innerHTML = '<div class="empty-warnings" style="padding-top:40px;">大氣穩定<br><span style="font-size:12px;color:#666;">No Active Alerts</span></div>';
        }

        // 5. 4-Day Extended Horizon Card Generators
        const fcRow = document.getElementById('forecastRow'); fcRow.innerHTML = '';
        for (let i = 0; i < 4; i++) {
          const dayEn = rFcEn.weatherForecast[i]; const dayTc = rFcTc.weatherForecast[i];
          if (!dayEn) break;
          const shortDay = dayEn.week.substring(0, 3);
          const dLabel = dayEn.forecastDate.substring(6,8) + '/' + dayEn.forecastDate.substring(4,6);
          const cIcon = getVectorIcon(dayEn.forecastIcon, dayEn.forecastWeather);
          fcRow.innerHTML += `
            <div class="forecast-card">
              <div class="fc-header-row">
                <div><span class="fc-day">${dayTc.week}</span> <span class="fc-zh">${shortDay}</span><br><span style="font-size:10px;color:#666;">${dLabel}</span></div>
                <div class="fc-icon-holder">${cIcon}</div>
              </div>
              <div class="fc-temp">${dayEn.forecastMintemp.value}°–${dayEn.forecastMaxtemp.value}°</div>
              <div class="fc-desc">${dayTc.forecastWeather}<br><span style="font-size:10px;color:#555;-webkit-line-clamp:1;overflow:hidden;">${dayEn.forecastWeather}</span></div>
            </div>`;
        }
      } catch (err) { console.error(err); }
    }
    refreshData();
    setInterval(refreshData, 3600000);
  </script>
</body>
</html>
